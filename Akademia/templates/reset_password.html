<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Reset hasła</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; text-align: center; padding-top: 50px; }
        form { background: white; padding: 20px; display: inline-block; border-radius: 8px; box-shadow: 0 0 10px #aaa; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; }
        button { padding: 10px 20px; background: #1e90ff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0d6efd; }
    </style>
</head>
<body>

<h2>Resetowanie hasła</h2>

<form method="POST">
    <input type="email" name="email" placeholder="Twój email" required>
    <input type="password" name="new_password" placeholder="Nowe hasło" required>
    <button type="submit">Zmień hasło</button>
</form>

<br><br>
<a href="/">Powrót</a>

</body>
</html>
