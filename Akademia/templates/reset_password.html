<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Reset hasła</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #f0faf4, #e0f0e8);
            text-align: center;
            padding-top: 50px;
            color: #1b3d1b;
        }
        form {
            background: white;
            padding: 24px;
            display: inline-block;
            border-radius: 12px;
            box-shadow: 0 8px 28px rgba(27, 61, 43, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.2);
        }
        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }
        button {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
        }
        button:hover { background: #219a52; }
        a { color: #1d6b3d; }
    </style>
</head>
<body>

<h2>Resetowanie hasła</h2>

<form method="POST">
    <input type="email" name="email" placeholder="Twój email" required>
    <input type="password" name="new_password" placeholder="Nowe hasło" required>
    <button type="submit">Zmień hasło</button>
</form>

<br><br>
<a href="/">Powrót</a>

</body>
</html>
