<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1b3d1b;
            background-image: url('/static/murawa.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(240, 250, 245, 0.75), rgba(215, 235, 220, 0.82));
            z-index: -1;
        }
        .container {
            background: rgba(255, 255, 255, 0.94);
            padding: 40px;
            border-radius: 18px;
            width: 380px;
            border: 1px solid rgba(46, 204, 113, 0.22);
            box-shadow: 0 12px 40px rgba(27, 61, 43, 0.12);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(39, 174, 96, 0.3);
            background: #fff;
            color: #1b3d1b;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            border-color: rgba(39, 174, 96, 0.55);
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #27ae60;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(39, 174, 96, 0.35);
            transition: 0.2s;
        }
        button:hover {
            background: #219a52;
        }
        .error {
            color: #b91c1c;
            text-align: center;
            margin-bottom: 10px;
        }
        a {
            display: block;
            margin-top: 12px;
            text-align: center;
            color: #1d6b3d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Rejestracja</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="first_name" placeholder="Imię" required>
        <input type="text" name="last_name" placeholder="Nazwisko" required>

        <select name="player_alias" required>
            <option value="">Wybierz swojego piłkarza</option>
            {% for p in available_players %}
            <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>

        <button type="submit">Załóż konto</button>
    </form>

    <a href="/login">Masz już konto? Zaloguj się</a>
    <a href="/">Powrót na stronę główną</a>
</div>

</body>
</html>
