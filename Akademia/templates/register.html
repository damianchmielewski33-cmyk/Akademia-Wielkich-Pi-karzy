<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 0 15px rgba(30, 144, 255, 0.4);
            text-align: center;
        }

        h2 {
            font-weight: 300;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #222;
            color: #fff;
            font-size: 15px;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e90ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0d6efd;
            box-shadow: 0 0 10px #1e90ff;
        }

        a {
            color: #1e90ff;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Utwórz konto</h2>

    <form method="POST">
        <input type="text" name="full_name" placeholder="Imię i nazwisko" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Hasło" required>
        <button type="submit">Zarejestruj</button>
    </form>

    <a href="/login">Masz już konto? Zaloguj się</a>
</div>

</body>
</html>
