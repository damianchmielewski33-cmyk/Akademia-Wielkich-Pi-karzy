<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel admina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo">⚽</span>
            <span class="logo-text">Panel admina</span>
            <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active" data-section="dashboard">🏠 Dashboard</button>
            <button class="nav-item" data-section="users">👤 Użytkownicy</button>
            <button class="nav-item" data-section="matches">⚽ Mecze</button>
            <button class="nav-item" data-section="stats">📊 Statystyki</button>
        </nav>

        <div class="sidebar-footer">
            <a href="/" class="back-link">⬅ Powrót</a>
            <button class="logout-btn" id="logoutBtn">🚪 Wyloguj</button>
        </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">


    <!-- DASHBOARD -->
        <section id="section-dashboard" class="section visible">
            <h1>Dashboard</h1>

            <div class="cards-row">
                <div class="card">
                    <div class="card-label">Gracze</div>
                    <div class="card-value" id="dashPlayers">-</div>
                </div>
                <div class="card">
                    <div class="card-label">Mecze</div>
                    <div class="card-value" id="dashMatches">-</div>
                </div>
                <div class="card">
                    <div class="card-label">Statystyki</div>
                    <div class="card-value" id="dashStats">-</div>
                </div>
            </div>

            <h2>Ostatnie aktywności</h2>
            <ul id="activityList" class="activity-list"></ul>
        </section>

        <!-- USERS -->
        <section id="section-users" class="section">
            <h1>Użytkownicy</h1>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>Imię</th>
                        <th>Nazwisko</th>
                        <th>Alias</th>
                        <th>Rola</th>
                        <th>Akcje</th>
                    </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </section>

        <!-- MATCHES -->
        <section id="section-matches" class="section">
            <h1>Mecze</h1>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Godzina</th>
                        <th>Lokalizacja</th>
                        <th>Zawodnicy</th>
                        <th>Akcje</th>
                    </tr>
                    </thead>
                    <tbody id="matchesTableBody"></tbody>
                </table>
            </div>
        </section>

        <!-- STATS -->
        <section id="section-stats" class="section">
            <h1>Statystyki</h1>

            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Zawodnik</th>
                        <th>Mecz</th>
                        <th>Gole</th>
                        <th>Asysty</th>
                        <th>Dystans</th>
                        <th>Akcje</th>
                    </tr>
                    </thead>
                    <tbody id="statsTableBody"></tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<!-- MODAL OVERLAY -->
<div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
        <button class="modal-close" id="modalCloseBtn">✖</button>
        <div id="modalContent"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>
</html>
