<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #1b3d1b;
            background-image: url('/static/murawa.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(240, 250, 245, 0.75), rgba(215, 235, 220, 0.82));
            z-index: -1;
        }

        .container {
            max-width: 420px;
            margin: 80px auto;
            padding: 25px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            border: 1px solid rgba(46, 204, 113, 0.22);
            box-shadow: 0 12px 40px rgba(27, 61, 43, 0.12);
        }

        h1 {
            font-weight: 300;
            text-align: center;
            margin-bottom: 25px;
            font-size: 32px;
        }

        label {
            font-size: 14px;
            opacity: 0.9;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: 1px solid rgba(39, 174, 96, 0.25);
            background: #ffffff;
            color: #1b3d1b;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: rgba(39, 174, 96, 0.55);
            background: #f8fcf9;
        }

        select option {
            background: #ffffff;
            color: #1b3d1b;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #27ae60;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 4px 14px rgba(39, 174, 96, 0.35);
        }

        .btn-submit:hover {
            background: #219a52;
            box-shadow: 0 6px 18px rgba(39, 174, 96, 0.45);
            transform: translateY(-2px);
        }

        .error-box {
            background: rgba(255, 99, 99, 0.2);
            color: #8b1c1c;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        .bottom-links {
            text-align: center;
            margin-top: 20px;
        }

        .bottom-links a {
            color: #1d6b3d;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .bottom-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <h1>🔐 Logowanie</h1>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">

        <label>Imię:</label>
        <input type="text" name="first_name" placeholder="Wpisz imię" required>

        <label>Nazwisko:</label>
        <input type="text" name="last_name" placeholder="Wpisz nazwisko" required>

        <label>Wybierz swojego piłkarza (alias):</label>
        <select name="player_alias" required>
            <option value="">-- wybierz alias --</option>
            {% for alias in used_players %}
            <option value="{{ alias }}">{{ alias }}</option>
            {% endfor %}
        </select>

        <button type="submit" class="btn-submit">Zaloguj się</button>
    </form>

    <div class="bottom-links">
        <a href="/register">Nie masz konta? Zarejestruj się</a><br><br>
        <a href="/">← Powrót na stronę główną</a>
    </div>

</div>

</body>
</html>
