<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #2a2a2a;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #1e90ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #0d6efd;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 10px;
        }
        a {
            display: block;
            margin-top: 12px;
            text-align: center;
            color: #1e90ff;
            text-decoration: none;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Logowanie</h2>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="first_name" placeholder="Imię" required>
        <input type="text" name="last_name" placeholder="Nazwisko" required>

        <select name="player_alias" required>
            <option value="">Wybierz swojego piłkarza</option>
            {% for p in used_players %}
            <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>

        <button type="submit">Zaloguj</button>
    </form>

    <a href="/register">Nie masz konta? Zarejestruj się</a>
    <a href="/">Powrót na stronę główną</a>
</div>

</body>
</html>
