<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 120px;
            margin: 0 auto 20px auto;
            display: block;
            filter: drop-shadow(0 0 5px #1e90ff);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #2a2a2a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            background: #333;
            box-shadow: 0 0 8px #1e90ff;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #1e90ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0d6efd;
            box-shadow: 0 0 10px #1e90ff;
        }

        a {
            display: block;
            margin-top: 12px;
            text-align: center;
            color: #1e90ff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        a:hover {
            text-decoration: underline;
            color: #63b3ff;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Wstaw tu swoje logo -->
    <img src="/static/logo.png" alt="Logo" class="logo">

    <h2>Logowanie</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Hasło" required>
        <button type="submit">Zaloguj</button>
    </form>

    <a href="/reset_password">Zapomniałeś hasła?</a>
    <a href="/register">Nie masz konta? Zarejestruj się</a>
    <a href="/">Powrót na stronę główną</a>

</div>

</body>
</html>
