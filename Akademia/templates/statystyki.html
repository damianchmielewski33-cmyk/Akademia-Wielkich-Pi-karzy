<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Statystyki</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #fff;
            background-image: url('/static/stadium.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        a.back {
            color: #1e90ff;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 18px rgba(0,0,0,0.4);
        }

        th, td {
            padding: 14px;
            text-align: center;
        }

        th {
            background: rgba(255,255,255,0.18);
            font-size: 18px;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.08);
        }

        tr:hover {
            background: rgba(255,255,255,0.18);
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <a href="/" class="back">⬅ Powrót</a>

    <h1>📊 Statystyki zawodników</h1>

    <table>
        <tr>
            <th>Zawodnik</th>
            <th>Rozegrane mecze</th>
            <th>Gole</th>
            <th>Asysty</th>
            <th>Dystans (km)</th>
        </tr>

        {% for p in stats %}
        <tr>
            <td>{{ p.first_name }} {{ p.last_name }} ({{ p.player_alias }})</td>
            <td>{{ p.matches }}</td>
            <td>{{ p.goals }}</td>
            <td>{{ p.assists }}</td>
            <td>{{ "%.1f"|format(p.distance) }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
