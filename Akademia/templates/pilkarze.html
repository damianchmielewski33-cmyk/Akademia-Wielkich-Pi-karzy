<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Piłkarze</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #fff;
            background-image: url('/static/stadium.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            font-weight: 300;
            font-size: 36px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .player-card {
            background: rgba(255,255,255,0.12);
            padding: 18px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 18px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e90ff, #00eaff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .player-name {
            font-size: 16px;
            font-weight: 600;
        }

        .player-alias {
            font-size: 13px;
            opacity: 0.8;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-modern {
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
            transition: 0.25s ease;
            backdrop-filter: blur(6px);
            background: rgba(255,255,255,0.12);
            color: #fff;
            box-shadow: 0 0 8px rgba(0,0,0,0.4);
        }

        .btn-modern:hover {
            background: rgba(255,255,255,0.22);
            box-shadow: 0 0 12px rgba(30,144,255,0.8);
            transform: translateY(-1px);
        }

        .logout-popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .logout-popup.open {
            display: flex;
            animation: fadeIn 0.25s ease;
        }

        .logout-inner {
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 18px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
            animation: scaleIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .logout-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .btn-logout-yes {
            flex: 1;
            padding: 10px;
            background: rgba(255,50,50,0.8);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-logout-yes:hover {
            background: rgba(255,50,50,1);
        }

        .btn-logout-no {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-logout-no:hover {
            background: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <div class="top-bar">
        <div>
            <h1>👥 Piłkarze</h1>
            <h2>Lista dostępnych aliasów i zawodników</h2>
        </div>
        <div>
            <a href="/" class="btn-modern">← Strona główna</a>
            {% if session.user_id %}
            <button class="btn-modern" onclick="openLogoutPopup()">🚪 Wyloguj</button>
            {% endif %}
        </div>
    </div>

    <div class="players-grid">
        {% for p in ALL_PLAYERS %}
        <div class="player-card">
            <div class="player-avatar">
                {{ p[0] }}
            </div>
            <div>
                <div class="player-name">{{ p }}</div>
                <div class="player-alias">Alias: {{ p }}</div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

<div id="logout-popup" class="logout-popup">
    <div class="logout-inner">
        <h3>Wylogować się?</h3>
        <p>Czy na pewno chcesz zakończyć sesję?</p>

        <div class="logout-buttons">
            <button class="btn-logout-yes" onclick="confirmLogout()">Tak, wyloguj</button>
            <button class="btn-logout-no" onclick="closeLogoutPopup()">Nie</button>
        </div>
    </div>
</div>

<script>
    function openLogoutPopup() {
        document.getElementById("logout-popup").classList.add("open");
    }
    function closeLogoutPopup() {
        document.getElementById("logout-popup").classList.remove("open");
    }
    function confirmLogout() {
        window.location.href = "/logout";
    }
</script>

</body>
</html>
