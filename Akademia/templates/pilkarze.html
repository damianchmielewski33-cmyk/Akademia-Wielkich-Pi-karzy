<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Piłkarze</title>

    <!-- WYKRESY -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #fff;
            background-image: url('/static/stadium.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        h1 {
            font-weight: 300;
            font-size: 40px;
            margin: 0;
        }

        h2 {
            font-weight: 300;
            opacity: 0.8;
            margin-top: 5px;
        }

        .btn-modern {
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
            transition: 0.25s ease;
            backdrop-filter: blur(6px);
            background: rgba(255,255,255,0.12);
            color: #fff;
            box-shadow: 0 0 8px rgba(0,0,0,0.4);
        }

        .btn-modern:hover {
            background: rgba(255,255,255,0.22);
            box-shadow: 0 0 12px rgba(30,144,255,0.8);
            transform: translateY(-2px);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 22px;
        }

        .player-card {
            background: rgba(255,255,255,0.12);
            padding: 20px;
            border-radius: 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 18px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: 0.25s ease;
        }

        .player-card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 25px rgba(30,144,255,0.8);
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .player-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e90ff, #00eaff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .player-name {
            font-size: 18px;
            font-weight: 600;
        }

        .player-alias {
            font-size: 14px;
            opacity: 0.8;
        }

        .btn-stats {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-block;
            transition: 0.25s ease;
            background: rgba(30,144,255,0.7);
            color: #fff;
            text-align: center;
        }

        .btn-stats:hover {
            background: rgba(30,144,255,0.9);
            box-shadow: 0 0 12px rgba(30,144,255,0.8);
            transform: translateY(-2px);
        }

        /* POPUP STATYSTYK */
        #statsModal {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.75);
            backdrop-filter:blur(8px);
            justify-content:center;
            align-items:center;
            z-index: 9999;
        }

        #statsModal .inner {
            background: rgba(20,20,20,0.92);
            color:#fff;
            padding:30px;
            border-radius:18px;
            width:600px;
            max-height:85vh;
            overflow-y:auto;
            box-shadow:0 0 25px rgba(0,0,0,0.6);
            animation: popupIn 0.25s ease;
            position: relative;
        }

        @keyframes popupIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position:absolute;
            top:12px;
            right:12px;
            background:none;
            border:none;
            color:#fff;
            font-size:20px;
            cursor:pointer;
        }

        .player-header-popup {
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:20px;
        }

        .avatar-popup {
            width:60px;
            height:60px;
            border-radius:50%;
            background:linear-gradient(135deg,#1e90ff,#00eaff);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            font-weight:700;
        }

        .stats-summary {
            display:flex;
            justify-content:space-between;
            margin-top:10px;
        }

        .stat-box {
            background:rgba(255,255,255,0.1);
            padding:12px 16px;
            border-radius:12px;
            text-align:center;
            width:23%;
        }

        .stat-box .label {
            font-size:13px;
            opacity:0.8;
        }

        .stat-box .value {
            font-size:22px;
            font-weight:700;
            margin-top:5px;
            display:block;
        }

        /* ANIMACJA LISTY MECZÓW */
        .match-item {
            opacity: 0;
            transform: translateY(10px);
            animation: matchFade 0.35s ease forwards;
        }

        @keyframes matchFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <div class="top-bar">
        <div>
            <h1>👥 Piłkarze</h1>
            <h2>Wszyscy zarejestrowani zawodnicy</h2>
        </div>
        <div>
            <a href="/" class="btn-modern">← Strona główna</a>
        </div>
    </div>

    <div class="players-grid">
        {% for p in players %}
        <div class="player-card">

            <div class="player-header">
                <div class="player-avatar">
                    {{ p.first_name[0] }}{{ p.last_name[0] }}
                </div>
                <div>
                    <div class="player-name">{{ p.first_name }} {{ p.last_name }}</div>
                    <div class="player-alias">Alias: {{ p.player_alias }}</div>
                </div>
            </div>

            <button class="btn-stats" onclick="showStats({{ p.id }})">📊 Statystyki</button>

        </div>
        {% endfor %}
    </div>

</div>

<!-- POPUP STATYSTYK -->
<div id="statsModal">
    <div class="inner">
        <button class="close-btn" onclick="closeStats()">✖</button>

        <div class="player-header-popup">
            <div class="avatar-popup" id="avatarPopup"></div>
            <h2 id="playerName"></h2>
        </div>

        <div class="stats-summary">
            <div class="stat-box">
                <span class="label">Mecze</span>
                <span class="value" id="sumMatches"></span>
            </div>
            <div class="stat-box">
                <span class="label">Gole</span>
                <span class="value" id="sumGoals"></span>
            </div>
            <div class="stat-box">
                <span class="label">Asysty</span>
                <span class="value" id="sumAssists"></span>
            </div>
            <div class="stat-box">
                <span class="label">Dystans</span>
                <span class="value" id="sumDistance"></span>
            </div>
        </div>

        <h3 style="margin-top:25px;">Wykres statystyk</h3>
        <canvas id="statsChart" width="400" height="220" style="margin-bottom:25px;"></canvas>

        <h3>Historia meczów</h3>
        <div id="statsContent"></div>
    </div>
</div>

<script>
    function showStats(id) {
        fetch(`/player_stats/${id}`)
            .then(r => r.json())
            .then(data => {

                document.getElementById("playerName").innerText =
                    `${data.first_name} ${data.last_name}`;

                document.getElementById("avatarPopup").innerText =
                    data.first_name[0] + data.last_name[0];

                document.getElementById("sumMatches").innerText = data.matches;
                document.getElementById("sumGoals").innerText = data.goals;
                document.getElementById("sumAssists").innerText = data.assists;
                document.getElementById("sumDistance").innerText = data.distance.toFixed(1);

                // --- ANIMOWANA LISTA MECZÓW ---
                let html = "<ul style='list-style:none; padding-left:0;'>";
                data.games.forEach((g, i) => {
                    html += `
                        <li class="match-item" style="animation-delay:${i * 0.08}s;">
                            ${g.date} ${g.time} – ${g.location}
                            | G:${g.goals} A:${g.assists} D:${g.distance}
                        </li>
                    `;
                });
                html += "</ul>";
                document.getElementById("statsContent").innerHTML = html;

                // --- WYKRES ---
                const canvas = document.getElementById("statsChart");
                const ctx = canvas.getContext("2d");

                if (window.statsChart && typeof window.statsChart.destroy === "function") {
    window.statsChart.destroy();
}

                window.statsChart = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: ["Gole", "Asysty", "Dystans (km)"],
                        datasets: [{
                            label: "Statystyki zawodnika",
                            data: [data.goals, data.assists, data.distance],
                            backgroundColor: [
                                "rgba(30,144,255,0.7)",
                                "rgba(0,200,120,0.7)",
                                "rgba(255,180,0,0.7)"
                            ],
                            borderRadius: 8
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });

                document.getElementById("statsModal").style.display = "flex";
            });
    }

    function closeStats() {
        document.getElementById("statsModal").style.display = "none";
    }
</script>

</body>
</html>
