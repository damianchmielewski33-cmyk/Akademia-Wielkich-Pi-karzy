# Buduje APK Androida bez Android Studio.
# GitHub → Actions → „Build Android APK” → Run workflow
# Potem: Releases → akademia-wp.apk albo strona /pobierz

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Adres produkcyjnej strony (https://…/ z ukośnikiem na końcu)"
        required: true
        type: string
        default: "https://akademia-wielkich-pilkarzy.vercel.app/"
  push:
    branches: [master, main]
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Resolve API base URL
        id: api
        shell: bash
        run: |
          URL="${{ github.event.inputs.api_base_url }}"
          if [ -z "$URL" ] || [ "$URL" = "https://" ]; then
            URL="${{ secrets.ANDROID_API_BASE_URL }}"
          fi
          if [ -z "$URL" ]; then
            URL=$(grep -E '^API_BASE_URL=' android/gradle.properties | cut -d= -f2- || true)
          fi
          if [ -z "$URL" ] || [ "$URL" = "https://" ] || [[ "$URL" == *"ZMIEŃ"* ]]; then
            echo "::error::Ustaw adres strony w Run workflow albo API_BASE_URL w android/gradle.properties"
            exit 1
          fi
          case "$URL" in
            */) ;;
            *) URL="${URL}/" ;;
          esac
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Używam API: $URL"

      - name: Write local.properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > android/local.properties
          echo "api.base.url=${{ steps.api.outputs.url }}" >> android/local.properties
          cat android/local.properties

      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease --stacktrace

      - name: Zipalign + jarsigner (v1 JAR)
        working-directory: android
        run: |
          set -euo pipefail
          # build-tools 35 apksigner NIE zapisuje v1 mimo --v1-signing-enabled true
          # (weryfikacja: v1=false, v2/v3=true). Sideload na OEM wymaga v1 → jarsigner.
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          BUILD_TOOLS=$(ls -1d "$SDK"/build-tools/* | sort -V | tail -n1)
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"
          OUT_DIR="app/build/outputs/apk/release"
          if [ -f "$OUT_DIR/app-release-unsigned.apk" ]; then
            IN="$OUT_DIR/app-release-unsigned.apk"
          elif [ -f "$OUT_DIR/app-release.apk" ]; then
            IN="$OUT_DIR/app-release.apk"
          else
            echo "Brak APK w $OUT_DIR"; ls -la "$OUT_DIR" || true; exit 1
          fi
          ALIGNED="$OUT_DIR/app-release-aligned.apk"
          OUT="$OUT_DIR/app-release-signed.apk"
          echo "Input APK: $IN"
          "$ZIPALIGN" -f -p 4 "$IN" "$ALIGNED"
          cp "$ALIGNED" "$OUT"
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore/awp-upload.p12 -storetype PKCS12 \
            -storepass awp-sideload-2026 -keypass awp-sideload-2026 \
            "$OUT" awp
          echo "=== jarsigner -verify ==="
          jarsigner -verify -verbose -certs "$OUT" | tail -n 30
          python3 - <<'PY'
          import zipfile, sys
          z = zipfile.ZipFile("app/build/outputs/apk/release/app-release-signed.apk")
          names = set(z.namelist())
          sf = sorted(n for n in names if n.startswith("META-INF/") and n.endswith(".SF"))
          rsa = sorted(n for n in names if n.startswith("META-INF/") and (n.endswith(".RSA") or n.endswith(".DSA")))
          if "META-INF/MANIFEST.MF" not in names or not sf or not rsa:
              print("MISSING v1 META-INF:", "SF", sf, "RSA/DSA", rsa)
              sys.exit(1)
          print("v1 JAR signature OK:", sf + rsa)
          PY
          # Informacyjnie: apksigner powinien zgłosić v1=true (v2 może być false — OK przy sideload)
          VERIFY_OUT=$("$APKSIGNER" verify --verbose --print-certs "$OUT" 2>&1 || true)
          echo "=== apksigner verify ==="
          echo "$VERIFY_OUT"
          echo "$VERIFY_OUT" | grep -q "Verified using v1 scheme (JAR signing): true"
          cp "$OUT" "$OUT_DIR/app-release.apk"

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/akademia-wp.apk
          ls -lh dist/akademia-wp.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: akademia-wp-apk
          path: dist/akademia-wp.apk
          if-no-files-found: error

      - name: Publish GitHub Release (android-latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release delete android-latest --yes 2>/dev/null || true
          git push origin :refs/tags/android-latest 2>/dev/null || true
          NOTES="APK Android. Pobierz akademia-wp.apk, zainstaluj na telefonie, zaloguj się PIN-em. API: ${{ steps.api.outputs.url }} Commit: ${{ github.sha }}"
          gh release create android-latest dist/akademia-wp.apk \
            --title "Aplikacja Android (najnowsza)" \
            --notes "$NOTES" \
            --latest
