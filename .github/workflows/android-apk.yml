# Buduje APK Androida bez Android Studio.
# GitHub → Actions → „Build Android APK” → Run workflow
# Potem: Releases → akademia-wp.apk albo strona /pobierz

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Adres produkcyjnej strony (https://…/ z ukośnikiem na końcu)"
        required: true
        type: string
        default: "https://akademia-wielkich-pilkarzy.vercel.app/"
  push:
    branches: [master, main]
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Resolve API base URL
        id: api
        shell: bash
        run: |
          URL="${{ github.event.inputs.api_base_url }}"
          if [ -z "$URL" ] || [ "$URL" = "https://" ]; then
            URL="${{ secrets.ANDROID_API_BASE_URL }}"
          fi
          if [ -z "$URL" ]; then
            URL=$(grep -E '^API_BASE_URL=' android/gradle.properties | cut -d= -f2- || true)
          fi
          if [ -z "$URL" ] || [ "$URL" = "https://" ] || [[ "$URL" == *"ZMIEŃ"* ]]; then
            echo "::error::Ustaw adres strony w Run workflow albo API_BASE_URL w android/gradle.properties"
            exit 1
          fi
          case "$URL" in
            */) ;;
            *) URL="${URL}/" ;;
          esac
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Używam API: $URL"

      - name: Write local.properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > android/local.properties
          echo "api.base.url=${{ steps.api.outputs.url }}" >> android/local.properties
          cat android/local.properties

      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease --stacktrace

      - name: Sign APK (v2/v3 via uber-apk-signer)
        working-directory: android
        run: |
          set -euo pipefail
          # minSdk 26 → Android NIE wymaga v1 (wszystkie wspierane urządzenia mają v2).
          # apksig/AGP celowo pomijają v1; targetSdk 34 wymaga v2+.
          # Wcześniejszy fail CI na „v1: false” był fałszywym alarmem.
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          BUILD_TOOLS=$(ls -1d "$SDK"/build-tools/* | sort -V | tail -n1)
          APKSIGNER="$BUILD_TOOLS/apksigner"
          OUT_DIR="app/build/outputs/apk/release"
          if [ -f "$OUT_DIR/app-release-unsigned.apk" ]; then
            IN="$OUT_DIR/app-release-unsigned.apk"
          else
            echo "Brak unsigned APK"; ls -la "$OUT_DIR" || true; exit 1
          fi
          curl -fsSL -o /tmp/uber-apk-signer.jar \
            "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar"
          java -jar /tmp/uber-apk-signer.jar \
            --apks "$IN" \
            --allowResign \
            --overwrite \
            --ks keystore/awp-upload.p12 \
            --ksAlias awp \
            --ksType PKCS12 \
            --ksPass awp-sideload-2026 \
            --ksKeyPass awp-sideload-2026
          OUT=""
          for cand in "$IN" \
            "$OUT_DIR/app-release-unsigned-aligned-signed.apk" \
            "$OUT_DIR/app-release-unsigned-signed.apk" \
            "$OUT_DIR/app-release.apk"; do
            if [ -f "$cand" ]; then OUT="$cand"; break; fi
          done
          if [ -z "$OUT" ]; then
            OUT=$(ls -1t "$OUT_DIR"/*.apk 2>/dev/null | head -n1 || true)
          fi
          if [ -z "${OUT:-}" ] || [ ! -f "$OUT" ]; then
            echo "Nie znaleziono podpisanego APK"; ls -la "$OUT_DIR"; exit 1
          fi
          echo "Signed APK: $OUT"
          VERIFY_OUT=$("$APKSIGNER" verify --verbose --print-certs "$OUT" 2>&1)
          echo "$VERIFY_OUT"
          echo "$VERIFY_OUT" | grep -q "Verifies"
          echo "$VERIFY_OUT" | grep -Eq "Verified using v2 scheme \(APK Signature Scheme v2\): true|Verified using v3 scheme \(APK Signature Scheme v3\): true"
          # v1 może być false przy minSdk>=24 — to OK
          cp "$OUT" "$OUT_DIR/app-release.apk"
          ls -lh "$OUT_DIR/app-release.apk"
          echo "OK: podpis v2/v3 zweryfikowany (v1 opcjonalne przy minSdk 26)"

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/akademia-wp.apk
          ls -lh dist/akademia-wp.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: akademia-wp-apk
          path: dist/akademia-wp.apk
          if-no-files-found: error

      - name: Publish GitHub Release (android-latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release delete android-latest --yes 2>/dev/null || true
          git push origin :refs/tags/android-latest 2>/dev/null || true
          NOTES="APK Android. Pobierz akademia-wp.apk, zainstaluj na telefonie, zaloguj się PIN-em. API: ${{ steps.api.outputs.url }} Commit: ${{ github.sha }}"
          gh release create android-latest dist/akademia-wp.apk \
            --title "Aplikacja Android (najnowsza)" \
            --notes "$NOTES" \
            --latest
